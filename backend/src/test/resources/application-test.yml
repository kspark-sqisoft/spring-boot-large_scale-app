app:
  redis:
    enabled: false
  kafka:
    enabled: false
  jwt:
    secret: test-jwt-secret-for-hs256-must-be-long-enough-string
  security:
    bootstrap-admin: false

spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:board_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
