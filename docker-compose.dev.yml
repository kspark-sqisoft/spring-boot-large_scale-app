# 개발용: 소스 마운트 + 백엔드 Gradle continuous / 프론트 Vite HMR
# 사용: docker compose -f docker-compose.dev.yml up --build
name: board-dev

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: board
      MYSQL_USER: board
      MYSQL_PASSWORD: board
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - gradle_dev_cache:/gradle-cache
      - upload_dev_data:/data/uploads
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/board?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: board
      SPRING_DATASOURCE_PASSWORD: board
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-only-change-this-secret-32chars-min!!}
      APP_SECURITY_BOOTSTRAP_ADMIN: "true"
      APP_SECURITY_INITIAL_ADMIN_EMAIL: admin@board.local
      APP_SECURITY_INITIAL_ADMIN_PASSWORD: ChangeMe_Admin_1
      APP_UPLOAD_DIR: /data/uploads
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
    depends_on:
      mysql:
        condition: service_healthy

  # node_modules는 ./frontend 에 두어 package.json 변경이 바로 반영되게 함(별도 볼륨은 오래된 의존성으로 Vite resolve 실패를 유발할 수 있음)
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
      VITE_USE_POLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_dev_data:
  gradle_dev_cache:
  upload_dev_data:
