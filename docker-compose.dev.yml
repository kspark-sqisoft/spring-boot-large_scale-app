# 개발용: 소스 마운트 + 백엔드 Gradle continuous / 프론트 Vite HMR
# 사용: docker compose -f docker-compose.dev.yml up --build
name: board-dev

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: board
      MYSQL_USER: board
      MYSQL_PASSWORD: board
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --smp
      - "1"
      - --memory
      - 512M
      - --mode
      - dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - gradle_dev_cache:/gradle-cache
      # 업로드는 호스트 ./data/uploads 에 두어 compose down -v / 볼륨 삭제 시에도 파일이 남도록 함 (이름 붙은 볼륨만 쓰면 재생성 시 이미지 404)
      - ./data/uploads:/data/uploads
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/board?useSSL=false&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: board
      SPRING_DATASOURCE_PASSWORD: board
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-only-change-this-secret-32chars-min!!}
      APP_SECURITY_BOOTSTRAP_ADMIN: "true"
      APP_SECURITY_INITIAL_ADMIN_EMAIL: admin@board.local
      APP_SECURITY_INITIAL_ADMIN_PASSWORD: ChangeMe_Admin_1
      APP_UPLOAD_DIR: /data/uploads
      APP_REDIS_ENABLED: "true"
      APP_REDIS_VIEW_HOST: redis
      APP_REDIS_VIEW_PORT: "6379"
      APP_KAFKA_ENABLED: "true"
      APP_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  # node_modules는 ./frontend 에 두어 package.json 변경이 바로 반영되게 함(별도 볼륨은 오래된 의존성으로 Vite resolve 실패를 유발할 수 있음)
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
      VITE_USE_POLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_dev_data:
  gradle_dev_cache:
